# Database Configuration
# Use placeholders so you can set these in Render Environment Variables
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/eexchange}
spring.mongodb.auto-index-creation=true

# Security Configuration
app.secret.key=${APP_SECRET_KEY:default_secret_key_change_me_in_production}

# Email Configuration - Using Brevo API
BREVO_API_KEY=${BREVO_API_KEY:}